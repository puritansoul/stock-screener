name: Daily Factor Screener

on:
  schedule:
    - cron: '5 14 * * 1-5'   # 10:05 AM ET (14:05 UTC)
    - cron: '5 21 * * 1-5'   # 5:05 PM ET  (21:05 UTC)
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore EDGAR cache
        uses: actions/cache@v4
        with:
          path: edgar_cache/
          key: edgar-cache-${{ runner.os }}-v1
          restore-keys: edgar-cache-${{ runner.os }}-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run live_monitor.py
        run: python live_monitor.py

      - name: Update index.html
        run: |
          python - <<'PYEOF'
          from pathlib import Path
          from datetime import date
          today   = date.today().isoformat()
          reports = sorted(Path("reports").glob("*.html"), reverse=True)
          if not Path(f"reports/{today}.html").exists() and reports:
              today = reports[0].stem
          links = "".join(
              f'<li><a href="reports/{r.stem}.html">{r.stem}</a></li>\n'
              for r in reports[:30]
          )
          Path("index.html").write_text(
              f'<!DOCTYPE html><html><head><meta charset="UTF-8">'
              f'<meta http-equiv="refresh" content="0; url=reports/{today}.html">'
              f'<title>Factor Screener</title></head><body>'
              f'<p>Redirecting to <a href="reports/{today}.html">{today}</a>...</p>'
              f'<ul>{links}</ul></body></html>'
          )
          print(f"index.html -> reports/{today}.html")
          PYEOF

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ portfolio_state.json portfolio_nav.json index.html
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "screener: $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git push
          echo "RUN_LABEL=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV

      - name: Send email notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Factor Screener <${{ secrets.GMAIL_ADDRESS }}>
          subject: "Screener - ${{ env.RUN_LABEL }}"
          html_body: >
            <h2>Factor Screener ran successfully</h2>
            <p>Run time: ${{ env.RUN_LABEL }}</p>
            <p><a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/">View latest report</a></p>
            <p style="color:#888;font-size:12px">GitHub Actions - ${{ github.repository }}</p>
