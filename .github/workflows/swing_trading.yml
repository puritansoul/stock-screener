name: Swing Trader

on:
  schedule:
    - cron: '10 14 * * 1-5'   # 10:10 AM ET (14:10 UTC), after screener
  workflow_dispatch:

jobs:
  swing-trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run swing trader
        run: python swing_trader.py

      - name: Build trading hub
        run: python build_hub.py

      - name: Build consolidated dashboard
        run: python build_consolidated.py

      - name: Update swing index
        run: |
          python - <<'PYEOF'
          from pathlib import Path
          from datetime import date
          today   = date.today().isoformat()
          reports = sorted(Path("reports").glob("swing_*.html"), reverse=True)
          if not reports:
              exit(0)
          latest = reports[0].name
          links = "".join(
              f'<li><a href="reports/{r.name}">{r.stem.replace("swing_","")}</a></li>\n'
              for r in reports[:30]
          )
          swing_index = (
              '<!DOCTYPE html><html><head><meta charset="UTF-8">'
              f'<meta http-equiv="refresh" content="0; url=reports/{latest}">'
              '<title>Swing Trader</title></head><body>'
              f'<p>Redirecting to <a href="reports/{latest}">{latest}</a>...</p>'
              f'<ul>{links}</ul></body></html>'
          )
          Path("swing_index.html").write_text(swing_index)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in swing_trades.json swing_index.html trading_hub.html consolidated.html; do
            [ -f "$f" ] && git add -f "$f"
          done
          find reports -name 'swing_*.html' 2>/dev/null | xargs -r git add -f
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "swing: $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
