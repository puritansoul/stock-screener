name: Intraday Trader

on:
  schedule:
    # Every 15 min, 9:30 AM – 4:00 PM ET (13:30–20:00 UTC), Mon–Fri
    - cron: '30,45 13 * * 1-5'
    - cron: '0,15,30,45 14,15,16,17,18,19 * * 1-5'
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

jobs:
  intraday-trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intraday trader
        run: python intraday_trader.py

      - name: Build trading hub
        run: python build_hub.py

      - name: Update intraday index
        run: |
          python - <<'PYEOF'
          from pathlib import Path
          reports = sorted(Path("reports").glob("intraday_*.html"), reverse=True)
          if not reports:
              exit(0)
          latest = reports[0].name
          links = "".join(
              f'<li><a href="reports/{r.name}">{r.stem.replace("intraday_","")}</a></li>\n'
              for r in reports[:30]
          )
          Path("intraday_index.html").write_text(
              '<!DOCTYPE html><html><head><meta charset="UTF-8">'
              f'<meta http-equiv="refresh" content="0; url=reports/{latest}">'
              '<title>Intraday Trader</title></head><body>'
              f'<p>Redirecting to <a href="reports/{latest}">{latest}</a>...</p>'
              f'<ul>{links}</ul></body></html>'
          )
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in intraday_trades.json intraday_index.html trading_hub.html; do
            [ -f "$f" ] && git add -f "$f"
          done
          find reports -name 'intraday_*.html' 2>/dev/null | xargs -r git add -f
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "intraday: $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git pull --rebase origin main
          git push
